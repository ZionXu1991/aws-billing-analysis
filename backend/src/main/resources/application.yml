server:
  port: 8082
  servlet:
    context-path: /api

spring:
  application:
    name: aws-billing-analysis
  datasource:
    url: jdbc:postgresql://localhost:5432/billing_db
    username: ${DB_USERNAME:billing_admin}
    password: ${DB_PASSWORD:billing_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: billing
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# AWS
aws:
  region: ${AWS_REGION:ap-southeast-1}

# Billing Module
billing:
  athena:
    database: ${BILLING_ATHENA_DB:billing_cur_db}
    workgroup: ${BILLING_ATHENA_WORKGROUP:billing-workgroup}
    output-location: ${BILLING_ATHENA_OUTPUT:s3://billing-hub-athena-results/}
    catalog: AwsDataCatalog
  ingestion:
    enabled: ${BILLING_INGESTION_ENABLED:false}
  anomaly-detection:
    enabled: ${BILLING_ANOMALY_ENABLED:false}
    rolling-window-days: 30
    thresholds:
      critical: 3.0
      high: 2.0
      medium: 1.5

logging:
  level:
    com.devops.billing: DEBUG
    org.springframework.web: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
